name: AI PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Codex review
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Restore Codex auth cache
        id: codex-cache
        uses: actions/cache@v4
        with:
          path: ~/.codex/auth.json
          key: codex-auth-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            codex-auth-${{ github.repository }}-

      - name: Seed Codex auth from secret on cache miss
        if: steps.codex-cache.outputs.cache-hit != 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH_JSON:-}" ]; then
            echo "::error::CODEX_AUTH_JSON secret is not set and no cached auth was restored. Run 'codex login' locally and paste the contents of ~/.codex/auth.json into the CODEX_AUTH_JSON repo secret."
            exit 1
          fi
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Verify Codex auth
        run: |
          codex --version
          codex auth status || true

      - name: Compute PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git diff "$BASE_SHA"..."$HEAD_SHA" > /tmp/pr.diff
          echo "Diff size: $(wc -c </tmp/pr.diff) bytes, $(wc -l </tmp/pr.diff) lines"
          head -c 500 /tmp/pr.diff

      - name: Run Codex spike prompt
        id: codex
        run: |
          set -euo pipefail
          PROMPT_FILE=/tmp/prompt.txt
          {
            echo "You are reviewing a pull request as a smoke test."
            echo "Read the diff at /tmp/pr.diff and respond with:"
            echo "1. One-sentence summary of what changed."
            echo "2. One concern, if any (or 'no concerns')."
            echo "Keep the entire response under 100 words. Plain text only."
          } > "$PROMPT_FILE"
          codex exec \
            --sandbox read-only \
            --skip-git-repo-check \
            --output-last-message /tmp/codex-out.txt \
            "$(cat $PROMPT_FILE)" \
            2>&1 | tee /tmp/codex-log.txt
          echo "--- Final message ---"
          cat /tmp/codex-out.txt

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- prism-ai-review -->';
            const ok = '${{ steps.codex.outcome }}' === 'success';
            let body;
            if (ok && fs.existsSync('/tmp/codex-out.txt')) {
              const out = fs.readFileSync('/tmp/codex-out.txt', 'utf8').trim() || '_(empty response)_';
              body = [marker, '## 🤖 AI PR review (spike)', '', out].join('\n');
            } else {
              const log = fs.existsSync('/tmp/codex-log.txt')
                ? fs.readFileSync('/tmp/codex-log.txt', 'utf8').slice(-3000)
                : '(no log captured)';
              body = [
                marker,
                '## 🤖 AI PR review (spike) — failed',
                '',
                'Codex execution failed. Last log lines:',
                '',
                '```',
                log,
                '```',
              ].join('\n');
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
