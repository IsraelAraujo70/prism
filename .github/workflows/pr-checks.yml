name: PR checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-and-verdict:
    name: Auto-label + release verdict
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;

            const TYPES = ['feat','fix','chore','docs','ci','refactor','test','perf','style','build'];
            const titleRe = new RegExp(`^(${TYPES.join('|')})(\\([^)]*\\))?(!)?:\\s`);
            const m = pr.title.match(titleRe);
            const type = m ? m[1] : null;
            const breaking = !!(m && m[3] === '!');

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: number, per_page: 100 }
            );

            const areas = new Set();
            for (const f of files) {
              const p = f.filename;
              if (p.startsWith('src-tauri/')) areas.add('area/backend');
              else if (p.startsWith('.github/')) areas.add('area/ci');
              else if (p === 'README.md' || p.startsWith('docs/')) areas.add('area/docs');
              else if (p.startsWith('src/')) areas.add('area/frontend');
            }

            const wanted = new Set();
            if (type) wanted.add(`type/${type}`);
            for (const a of areas) wanted.add(a);
            if (breaking) wanted.add('breaking');

            let verdict, bump, reason;
            if (!type) {
              verdict = 'invalid';
              reason = `PR title doesn't match conventional commits (\`<type>(scope)?: subject\`). Allowed types: ${TYPES.map(t => '`' + t + '`').join(', ')}.`;
            } else if (breaking) {
              verdict = 'release'; bump = 'major';
              reason = 'Breaking change marker (`!`) detected.';
            } else if (type === 'feat') {
              verdict = 'release'; bump = 'minor';
              reason = '`feat:` triggers a minor bump.';
            } else if (type === 'fix' || type === 'perf') {
              verdict = 'release'; bump = 'patch';
              reason = `\`${type}:\` triggers a patch bump.`;
            } else {
              verdict = 'skip';
              reason = `\`${type}:\` is non-functional, no release.`;
            }

            const colors = {
              'type/feat':'0E8A16','type/fix':'D73A4A','type/chore':'C5DEF5',
              'type/docs':'0075CA','type/ci':'FBCA04','type/refactor':'6F42C1',
              'type/test':'5319E7','type/perf':'F39C12','type/style':'CFD3D7',
              'type/build':'8B4513',
              'area/backend':'008672','area/frontend':'1D76DB',
              'area/ci':'FBCA04','area/docs':'0075CA',
              'breaking':'B60205',
            };

            for (const label of wanted) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo, name: label, color: colors[label] || 'CCCCCC',
                  });
                } else { throw e; }
              }
            }

            const existing = (pr.labels || []).map(l => l.name);
            const isManaged = (n) => n.startsWith('type/') || n.startsWith('area/') || n === 'breaking';
            const keep = existing.filter(n => !isManaged(n));
            const finalLabels = Array.from(new Set([...keep, ...wanted]));

            await github.rest.issues.setLabels({
              owner, repo, issue_number: number, labels: finalLabels,
            });

            const marker = '<!-- prism-pr-checks -->';
            const lines = [marker, '## 🔍 PR checks', ''];
            if (type) {
              lines.push(`**Type:** \`${type}\`${breaking ? ' · 💥 breaking' : ''}`);
            } else {
              lines.push(`**Type:** _unrecognized_`);
            }
            const areaList = [...areas].map(a => '`' + a + '`').join(', ');
            lines.push(`**Areas:** ${areaList || '_none detected_'}`);
            lines.push('');
            if (verdict === 'release') {
              lines.push(`### ✅ Merging will trigger a release (**${bump}** bump)`);
            } else if (verdict === 'skip') {
              lines.push(`### ⏭️ Merging will not trigger a release`);
            } else {
              lines.push(`### ⚠️ PR title needs to follow conventional commits`);
            }
            lines.push('');
            lines.push(reason);
            lines.push('');
            lines.push('_Auto-generated by `pr-checks.yml`. Edit the PR title to change the verdict._');
            const body = lines.join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: number, per_page: 100 }
            );
            const existingComment = comments.find(c => c.body && c.body.includes(marker));
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existingComment.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: number, body,
              });
            }

            await core.summary
              .addRaw(body.replace(marker, '').trim())
              .write();

            if (verdict === 'invalid') {
              core.setFailed('PR title does not follow conventional commits.');
            }
